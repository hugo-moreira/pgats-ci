# CI de nivel 01 - Disparo Manual através de clique

#nome da pipeline
name: 'Execução Manual'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

#tarefas dentro da pipeline

jobs:
  #nome do job
  e2e-test:

    #maquina onde o job vai rodar
    runs-on: ubuntu-latest

    #passo a passo do job
    steps:
      #clone do projeto
      - uses: actions/checkout@v4

      #instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do yarn
      - name: instalando Yarn
        run: npm install -g yarn

      # instalação das dependêcias
      - name: instalando dependendências
        run: yarn

      # instalação dos browsers do Playwright
      - name: instalando Browsers do Playwright
        run: yarn playwright install

      #executar os testes e2e
      - name: executando testes e2e
        run: yarn run e2e

    
    
