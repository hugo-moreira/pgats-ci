# CI de nível 02 - Pipeline com Relatório de Testes
#
# Actions do GitHub Marketplace utilizadas:
#
#   1. dorny/test-reporter@v1
#      Lê o arquivo JUnit XML gerado pelo Playwright e exibe os resultados
#      como checks e anotações diretamente na interface do GitHub Actions,
#      apontando exatamente qual teste falhou e em qual linha — sem precisar
#      baixar nenhum arquivo.
#      https://github.com/marketplace/actions/test-reporter
#
#   2. actions/upload-artifact@v4
#      Publica o relatório HTML completo do Playwright como artefato da
#      execução, com screenshots dos testes que falharam e detalhes de cada
#      passo. Fica disponível para download por 7 dias.
#      https://github.com/marketplace/actions/upload-a-build-artifact

name: 'Com Relatório de Testes'

on:
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    # permissão exigida pelo dorny/test-reporter para criar checks na UI
    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: instalando Yarn
        run: npm install -g yarn

      - name: instalando dependências
        run: yarn

      - name: instalando Browsers do Playwright
        run: yarn playwright install --with-deps chromium

      # continue-on-error garante que os passos de relatório sempre executem,
      # mesmo quando há testes falhando
      - name: executando testes e2e
        continue-on-error: true
        run: yarn run e2e

      # action do Marketplace #1: exibe resultados JUnit na UI do GitHub Actions
      - name: publicando resultados dos testes
        uses: dorny/test-reporter@v1
        with:
          name: 'Playwright E2E'
          path: results.xml
          reporter: java-junit
          fail-on-error: true

      # action do Marketplace #2: publica o relatório HTML como artefato
      - name: publicando relatório HTML do Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
